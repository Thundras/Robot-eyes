[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    olikraus/U8g2 @ ^2.35.17
build_flags =
    -DDEBUG=1

[env:esp32dev-release]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    olikraus/U8g2 @ ^2.35.17
build_flags =
    -DDEBUG=0
    -O2

; Wokwi simulation
[env:wokwi]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    olikraus/U8g2 @ ^2.35.17
