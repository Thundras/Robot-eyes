[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.10
    https://github.com/FluxGarage/RoboEyes.git
build_flags =
    -DDEBUG=1

[env:esp32dev-release]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.10
    https://github.com/FluxGarage/RoboEyes.git
build_flags =
    -DDEBUG=0
    -O2

; Wokwi simulation
[env:wokwi]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.10
    https://github.com/FluxGarage/RoboEyes.git
